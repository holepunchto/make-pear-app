name: 'Make Pear Apps'
description: 'Action for making Pear apps'
inputs:
  channel:
    description: 'Channel name'
    required: true
  macos_certificate_base64:
    description: 'Base64-encoded Apple distribution certificate (P12 format)'
    required: false
    default: ''
  macos_p12_password:
    description: 'Password for the P12 certificate'
    required: false
    default: ''
  macos_provisioning_profile_base64:
    description: 'Base64-encoded macOS provisioning profile (.provisionprofile)'
    required: false
    default: ''
  macos_api_key_base64:
    description: 'Base64-encoded Apple API key (.p8) for notarization'
    required: false
    default: ''
  macos_api_key_id:
    description: 'macOS API Key ID'
    required: false
    default: ''
  macos_api_key_issuer:
    description: 'macOS API Key issuer ID'
    required: false
    default: ''
  macos_codesign_identity:
    description: 'Code signing identity used for macOS builds'
    required: false
    default: ''
  windows_subject:
    description: 'Subject of the Windows code signing certificate'
    required: false
    default: ''
  windows_thumbprint:
    description: 'Thumbprint of the Windows code signing certificate'
    required: false
    default: ''
outputs:
  artifact-links:
    description: 'Links to uploaded artifacts'
    value: ${{ steps.upload-artifacts-bash.outputs.artifact_links || steps.upload-artifacts-pwsh.outputs.artifact_links }}
runs:
  using: composite
  steps:
    - name: 'Validate macOS inputs'
      if: ${{ runner.os == 'macOS' }}
      run: |
        MISSING=""
        [ -z "${{ inputs.macos_certificate_base64 }}" ] && MISSING="$MISSING macos_certificate_base64"
        [ -z "${{ inputs.macos_p12_password }}" ] && MISSING="$MISSING macos_p12_password"
        [ -z "${{ inputs.macos_provisioning_profile_base64 }}" ] && MISSING="$MISSING macos_provisioning_profile_base64"
        [ -z "${{ inputs.macos_api_key_base64 }}" ] && MISSING="$MISSING macos_api_key_base64"
        [ -z "${{ inputs.macos_api_key_id }}" ] && MISSING="$MISSING macos_api_key_id"
        [ -z "${{ inputs.macos_api_key_issuer }}" ] && MISSING="$MISSING macos_api_key_issuer"
        [ -z "${{ inputs.macos_codesign_identity }}" ] && MISSING="$MISSING macos_codesign_identity"
        if [ -n "$MISSING" ]; then
          echo "Error: Missing macOS inputs:$MISSING"
          exit 1
        fi
      shell: bash
    - name: 'Validate Windows inputs'
      if: ${{ runner.os == 'Windows' }}
      run: |
        $missing = @()
        if ([string]::IsNullOrEmpty("${{ inputs.windows_subject }}")) { $missing += "windows_subject" }
        if ([string]::IsNullOrEmpty("${{ inputs.windows_thumbprint }}")) { $missing += "windows_thumbprint" }
        if ($missing.Count -gt 0) {
          Write-Error "Error: Missing Windows inputs: $($missing -join ', ')"
          exit 1
        }
      shell: pwsh
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        registry-url: 'https://npm.pkg.github.com'
    - name: 'Install dependencies (Linux/macOS)'
      if: ${{ runner.os != 'Windows' }}
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
      run: |
        npm install
      shell: bash
    - name: 'Install dependencies (Windows)'
      if: ${{ runner.os == 'Windows' }}
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
      run: |
        npm install
      shell: pwsh
    - name: 'Install the Apple certificate and provisioning profile'
      if: ${{ runner.os == 'macOS' }}
      run: |
        # create variables
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.provisionprofile
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        APIKEY_PATH=$RUNNER_TEMP/AuthKey.p8
        KEYCHAIN_PASSWORD=keychain-password

        # import certificate and provisioning profile from secrets
        echo -n "${{ inputs.macos_certificate_base64 }}" | base64 --decode -o $CERTIFICATE_PATH
        echo -n "${{ inputs.macos_provisioning_profile_base64 }}" | base64 --decode -o $PP_PATH
        echo -n "${{ inputs.macos_api_key_base64 }}" | base64 --decode -o $APIKEY_PATH

        # create temporary keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        # import certificate to keychain
        security import $CERTIFICATE_PATH -P "${{ inputs.macos_p12_password }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        # add notarytool credentials
        xcrun notarytool store-credentials 'notary' --key "$APIKEY_PATH" --key-id "${{ inputs.macos_api_key_id }}" --issuer "${{ inputs.macos_api_key_issuer }}"

        # apply provisioning profile
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
      shell: bash
    - name: 'Build application (Linux)'
      if: ${{ runner.os == 'Linux' }}
      env:
        CHANNEL: "${{ inputs.channel }}"
      run: |
        npm run make
      shell: bash
    - name: 'Build application (macOS)'
      if: ${{ runner.os == 'macOS' }}
      env:
        CHANNEL: "${{ inputs.channel }}"
        MAC_CODESIGN_IDENTITY: "${{ inputs.macos_codesign_identity }}"
      run: |
        npm run make
      shell: bash
    - name: 'Build application (Windows)'
      if: ${{ runner.os == 'Windows' }}
      env:
        CHANNEL: "${{ inputs.channel }}"
        WIN_SUBJECT: "${{ inputs.windows_subject }}"
        WIN_THUMBPRINT: "${{ inputs.windows_thumbprint }}"
      run: |
        npm run make
      shell: pwsh
    - name: 'Install @actions/artifact module (Linux/macOS)'
      if: ${{ runner.os != 'Windows' }}
      run: |
        npm install @actions/artifact@2.3.2 --global
        echo "NODE_PATH=$(npm root --quiet -g)" >> $GITHUB_ENV
      shell: bash
    - name: 'Install @actions/artifact module (Windows)'
      if: ${{ runner.os == 'Windows' }}
      run: |
        npm install @actions/artifact@2.3.2 --global
        $npmRoot = npm root --quiet -g
        Add-Content -Path $env:GITHUB_ENV -Value "NODE_PATH=$npmRoot"
      shell: pwsh
    - name: 'Extract Actions runtime variables'
      uses: actions/github-script@v7
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        script: |
          core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL'])
          core.exportVariable('ACTIONS_RUNTIME_URL', process.env['ACTIONS_RUNTIME_URL'])
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'])
    - id: upload-artifacts-bash
      name: 'Upload folders as artifacts (Linux/macOS)'
      if: ${{ runner.os != 'Windows' }}
      env:
        NODE_PATH: "${{ env.NODE_PATH }}"
      run: node ${{ github.action_path }}/upload-artifacts.cjs
      shell: bash
    - id: upload-artifacts-pwsh
      name: 'Upload folders as artifacts (Windows)'
      if: ${{ runner.os == 'Windows' }}
      env:
        NODE_PATH: "${{ env.NODE_PATH }}"
      run: node ${{ github.action_path }}/upload-artifacts.cjs
      shell: pwsh
branding:
  icon: package
  color: green
